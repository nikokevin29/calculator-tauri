name: Release Multi-Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: false
        default: "v0.1.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc"
            label: "Windows x64"

          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            label: "macOS Intel"

          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            label: "macOS Apple Silicon"

          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: "--target x86_64-unknown-linux-gnu"
            label: "Linux x64"

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: bun install

      - name: Generate icons
        run: bunx @tauri-apps/cli icon src-tauri/app-icon.png

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Calculator ${{ github.ref_name }}"
          releaseBody: |
            ## Download

            | Platform | File |
            |----------|------|
            | Windows x64 (installer) | `Calculator_x64-setup.exe` |
            | Windows x64 (MSI) | `Calculator_x64_en-US.msi` |
            | macOS Intel | `Calculator_x64.dmg` |
            | macOS Apple Silicon | `Calculator_aarch64.dmg` |
            | Linux AppImage | `calculator-tauri_amd64.AppImage` |
            | Linux DEB | `calculator-tauri_amd64.deb` |

            ### Cara instalasi
            - **Windows**: jalankan `.exe` installer atau `.msi`
            - **macOS**: buka `.dmg`, drag app ke Applications
            - **Linux AppImage**: `chmod +x *.AppImage && ./calculator-tauri.AppImage`
            - **Linux DEB**: `sudo dpkg -i *.deb`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
